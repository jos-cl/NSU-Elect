<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard | NSUElect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/images/NSU%20Elect%20logo.png" type="image/png">
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <a class="brand" href="/dashboard.html">
        <img src="/images/NSU%20Elect%20logo.png" alt="NSUElect logo">
        <span>NSUElect</span>
      </a>
      <nav class="nav-links">
        <a class="active-link" href="/dashboard.html">Dashboard</a>
        <a href="/constitution.html">Constitution</a>
        <a href="/nominate.html">Nominate</a>
        <a href="/results.html">Results</a>
        <a href="#" data-action="logout">Logout</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="shell">
      <div class="notice" data-dashboard-notice hidden></div>
      <section data-profile></section>

      <section class="section">
        <div class="section-head">
          <div>
            <h2>Active and Upcoming Elections</h2>
            <p class="muted">Vote once per position. Ballots are final after submission.</p>
          </div>
        </div>
        <div class="dashboard-grid" data-elections></div>
      </section>

      <section class="section">
        <div class="section-head">
          <div>
            <h2>Current Leaders</h2>
            <p class="muted">Real-time vote totals from the selected election.</p>
          </div>
        </div>
        <div class="grid-3" data-leaders></div>
      </section>

      <section class="section">
        <div class="section-head">
          <div>
            <h2>Past Presidents</h2>
            <p class="muted">Published presidential records after declaration.</p>
          </div>
        </div>
        <div class="list" data-presidents></div>
      </section>
    </div>
  </main>

  <script type="module" src="/js/dashboard.js?v=20260415-2"></script>
</body>
</html>
